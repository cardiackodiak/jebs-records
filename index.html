<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jeb's Records</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <main class="page">
    <h1>Jeb's Records</h1>

    <section class="now">
      <p class="label">Now Spinning</p>
      <img id="now-cover" src="images/placeholder-cover.svg" alt="" style="opacity: 0" />

      <h2 id="now-artist" style="opacity: 0"></h2>
      <p id="now-title" style="opacity: 0"></p>

      <div class="actions">
        <button id="browse-button">Browse Collection</button>
      </div>
    </section>

  </main>

  <section id="browse-overlay" class="overlay" aria-hidden="true">

    <div id="browse-background"></div>

    <div class="overlay-content">

      <div class="overlay-header">

        <div class="browse-info">
          <div class="browse-label">Browsing</div>

          <h2 id="browse-artist"></h2>
          <p id="browse-title"></p>

          <div id="browse-meta"></div>
        </div>

        <div class="browse-actions">
          <input id="search-input" type="search" placeholder="Search artist or album...">

          <button id="close-browse" class="close-button">
            Close
          </button>

          <p id="album-count" class="album-count">
          </p>
        </div>

      </div>

      <div id="album-grid" class="album-grid"></div>

    </div>

  </section>


  <script src="js/app.js"></script>
</body>

</html>
